name: Rust GSNH Extension

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust-gsnh-extension:
    name: Build and test _rust_gsnh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Create Python virtual environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "maturin>=1.0,<2.0"

      - name: Check Rust formatting
        run: cargo fmt --manifest-path rust_gsnh/Cargo.toml --check

      - name: Run Rust tests
        run: cargo test --manifest-path rust_gsnh/Cargo.toml

      - name: Run Rust tests with Python helper feature
        run: cargo test --manifest-path rust_gsnh/Cargo.toml --features python

      - name: Build and install _rust_gsnh extension
        run: maturin develop --manifest-path rust_gsnh/Cargo.toml --features python,pyo3-extension

      - name: Run Rust binding tests
        run: pytest tests/test_rust_gsnh_binding.py -q

      - name: Run optional engine wrapper tests
        run: pytest tests/test_engine_wrapper.py -q

      - name: Run wrapper parity tests
        run: pytest tests/test_engine_wrapper_parity.py -q
