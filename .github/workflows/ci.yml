name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Black format check
        run: black --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Verify package import
        run: python -c "from gsnh_mdt.api import GSNHClassifier; print('Import OK')"

      - name: Run test suite
        run: python -m pytest tests/ -q --tb=short

  smoke:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Smoke test — benchmark import
        run: python -c "
          import sys; sys.path.insert(0, 'scripts');
          # Verify benchmark script can import from package
          from gsnh_mdt.tree.builder import ExpertGSNHTree;
          from gsnh_mdt.api import GSNHClassifier;
          print('Benchmark imports OK')
          "

      - name: Smoke test — proof imports
        run: python -c "
          from gsnh_mdt.sat.exact_solver import ExactSATSolver;
          from gsnh_mdt.types import LanguageFamily;
          print('Proof imports OK')
          "
